<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My ChirpSpace - Chirpy</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="chirpspace.css" />
  </head>
  <body>
    <div class="bg-shape a"></div>
    <div class="bg-shape b"></div>

    <header class="chirpspace-top">
      <div>
        <p class="eyebrow">Sovereign Social</p>
        <h1>My ChirpSpace</h1>
        <p id="chirpspaceIdentity" class="sub">Loading identity...</p>
      </div>
      <div class="row actions">
        <label class="field">
          <span>View As</span>
          <select id="viewerProfile"></select>
        </label>
        <label class="field">
          <span>Author Feed</span>
          <select id="authorProfile"></select>
        </label>
        <a class="btn ghost" href="/">Back to Publisher</a>
        <button id="refreshChirpSpace" class="btn primary" type="button">Refresh ChirpSpace</button>
      </div>
    </header>

    <main class="chirpspace-shell">
      <section id="chirpspaceFeed" class="chirpspace-feed"></section>
    </main>

    <template id="postTemplate">
      <article class="chirpspace-post">
        <header class="post-head">
          <strong class="post-date"></strong>
          <div class="row actions">
            <span class="post-visibility"></span>
            <span class="post-tags"></span>
            <button class="btn ghost small promote-btn hidden" type="button">Make Public</button>
          </div>
        </header>
        <p class="post-text"></p>
        <div class="post-photos"></div>
        <div class="post-videos"></div>
        <div class="post-links"></div>
      </article>
    </template>

    <script src="/chirpspace.js"></script>
  </body>
</html>
