<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My ChirpSpace - Chirpy</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="chirpspace.css" />
  </head>
  <body>
    <div class="bg-shape a"></div>
    <div class="bg-shape b"></div>

    <header class="chirpspace-top">
      <div>
        <p class="eyebrow">Sovereign Social</p>
        <h1>My ChirpSpace</h1>
        <p id="chirpspaceIdentity" class="sub">Loading identity...</p>
        <p id="desktopRuntime" class="sub small"></p>
      </div>
      <div class="row actions">
        <label class="field">
          <span>View As</span>
          <select id="viewerProfile"></select>
        </label>
        <label class="field">
          <span>Author Feed</span>
          <select id="authorProfile"></select>
        </label>
        <a class="btn ghost" href="/">Back to Publisher</a>
        <button id="refreshChirpSpace" class="btn primary" type="button">Refresh ChirpSpace</button>
      </div>
    </header>

    <main class="chirpspace-shell">
      <section id="onboardingCard" class="onboarding-card hidden">
        <h2>Welcome to Chirpy</h2>
        <p class="sub">Set your network nickname and exactly 3 interests for Chirper matching.</p>
        <label class="field">
          <span>Nickname</span>
          <input id="nicknameInput" type="text" placeholder="e.g. Jonny C" />
        </label>
        <label class="field">
          <span>Interests (comma separated, 3 total)</span>
          <input id="interestsInput" type="text" placeholder="3D printing, electronics, music" />
        </label>
        <div class="row actions">
          <button id="saveOnboarding" class="btn primary" type="button">Save & Start</button>
          <span id="onboardingStatus" class="sub small"></span>
        </div>
      </section>

      <section class="radar-shell">
        <div class="row between">
          <h2>Chirpers</h2>
          <button id="refreshRadar" class="btn ghost small" type="button">Refresh Radar</button>
        </div>
        <div id="radarList" class="radar-list"></div>
      </section>

      <section id="chirpspaceFeed" class="chirpspace-feed"></section>
    </main>

    <section id="walkthroughGate" class="walkthrough-gate hidden" aria-live="polite">
      <article class="walkthrough-card">
        <h2>First-Time Walkthrough</h2>
        <p class="sub">Finish required setup steps before using Chirpy.</p>
        <div id="walkthroughChecklist" class="walkthrough-checklist"></div>
        <div class="row actions">
          <a class="btn primary" href="/">Open Publisher Identity Setup</a>
          <button id="refreshWalkthrough" class="btn ghost small" type="button">Recheck</button>
          <button id="dismissWalkthrough" class="btn ghost small" type="button">Dismiss for now</button>
        </div>
      </article>
    </section>

    <template id="postTemplate">
      <article class="chirpspace-post">
        <header class="post-head">
          <strong class="post-date"></strong>
          <div class="row actions">
            <span class="post-visibility"></span>
            <span class="post-tags"></span>
            <button class="btn ghost small promote-btn hidden" type="button">Make Public</button>
          </div>
        </header>
        <p class="post-text"></p>
        <div class="post-photos"></div>
        <div class="post-videos"></div>
        <div class="post-links"></div>
      </article>
    </template>

    <script src="/chirpspace.js"></script>
  </body>
</html>
