<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chirpy Publisher</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Identity chip -->
  <div class="identity-topbar">
    <button id="avatarChip" class="avatar-chip" type="button" title="Identity"><span
        id="avatarInitials">ID</span></button>
    <section id="identityMenu" class="identity-menu hidden" aria-label="Identity settings">
      <div class="row between">
        <h2>Identity</h2><button id="closeIdentityMenu" class="btn ghost small" type="button">Close</button>
      </div>
      <label class="field"><span>Identity Profile</span><select id="profileSelect"></select>
        <label class="field"><span>Profile Role</span><select id="profileRole">
            <option value="adult">Adult (Guardian)</option>
            <option value="child">Child (Family-Only)</option>
          </select></label>
        <p id="profileSummary" class="sub small">No profile selected.</p>
        <label class="field">
          <span>Node Label (optional)</span>
          <input id="nodeNameInput" type="text" placeholder="my-mac-mini" />
          <p id="nodeNameStatus" class="sub small">Optional label for this installation.</p>
        </label>
        <div class="row actions">
          <button id="runSetup" class="btn primary small" type="button">Run First-Time Setup</button>
          <button id="saveNodeName" class="btn ghost small" type="button">Save Node Name</button>
          <button id="newProfile" class="btn ghost small" type="button">New Profile</button>
          <button id="renameProfile" class="btn ghost small" type="button">Rename</button>
          <button id="deleteProfile" class="btn ghost small" type="button">Delete</button>
          <button id="refreshKeys" class="btn ghost small" type="button">Refresh IPNS Keys</button>
        </div>
        <details>
          <summary class="sub small">Desktop Chirper Profile</summary>
          <label class="field">
            <span>Chirper Nickname</span>
            <input id="desktopNickname" type="text" placeholder="How you appear in Chirpers" />
          </label>
          <label class="field">
            <span>Interests (exactly 3, comma separated)</span>
            <input id="desktopInterests" type="text" placeholder="3D printing, electronics, music" />
          </label>
          <div class="row actions">
            <button id="saveDesktopProfile" class="btn ghost small" type="button">Save Chirper Profile</button>
            <span id="desktopProfileStatus" class="sub small">Desktop profile not loaded yet.</span>
          </div>
        </details>
        <details>
          <summary class="sub small">Advanced Identifiers</summary>
          <div class="onboarding">
            <div class="row between"><span>DID</span><span id="didStatus" class="status idle">CHECKING</span><button
                id="generateDid" class="btn ghost small" type="button">Generate DID</button></div>
            <div class="row between"><span>Encryption Keys</span><span id="encStatus"
                class="status idle">CHECKING</span><button id="generateEncKeys" class="btn ghost small"
                type="button">Add Encryption Keys</button></div>
            <div class="row between"><span>IPNS Key</span><span id="ipnsStatus"
                class="status idle">CHECKING</span><button id="createKey" class="btn ghost small" type="button">Create
                IPNS Key</button></div>
          </div>
          <label class="field"><span>Author DID</span><input id="userDid" type="text"
              placeholder="did:key:z6Mk..." /></label>
          <label class="field"><span>IPNS Key</span><input id="ipnsKey" type="text" value="self"
              list="ipnsKeyOptions" /></label>
        </details>
        <datalist id="ipnsKeyOptions"></datalist>
      </label>
    </section>
  </div>

  <!-- ═══ TOP BAR ═══ -->
  <header class="topbar">
    <h1>Chirpy Publisher</h1>
    <div class="topbar-center">
      <label class="field inline"><span>Audience</span>
        <select id="visibility">
          <option value="public">Public</option>
          <option value="family">Family Circle</option>
        </select>
      </label>
      <p id="visibilityHint" class="hint">Public = broad; Family = approved DIDs.</p>
      <label class="field inline"><span>Tags</span>
        <input id="tags" type="text" placeholder="3d-printing, music…" />
      </label>
      <label class="toggle"><input id="autoTag" type="checkbox" checked /><span>Auto-tag</span></label>
    </div>
    <div class="topbar-right">
      <label class="toggle"><input id="publish" type="checkbox" checked /><span>Publish</span></label>
      <button id="clearDraft" class="btn ghost small" type="button">Clear</button>
      <button id="submitBtn" class="btn primary" type="button">Stage Post</button>
      <a class="btn ghost small" href="chirpspace.html">ChirpSpace</a>
    </div>
  </header>

  <!-- ═══ LAYOUT: SIDEBAR + MAIN ═══ -->
  <div class="layout">
    <!-- LEFT SIDEBAR: Tools -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Add Block</div>
        <div class="sidebar-buttons">
          <button class="pill" data-add="text" type="button">+ Text</button>
          <button class="pill" data-add="title" type="button">+ Title</button>
          <button class="pill" data-add="image" type="button">+ Image</button>
          <button class="pill" data-add="video" type="button">+ Video</button>
          <button class="pill" data-add="link" type="button">+ Link</button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Format</div>
        <div class="editor-toolbar">
          <button class="icon-btn" data-format="bold" type="button"><b>B</b></button>
          <button class="icon-btn" data-format="italic" type="button"><i>I</i></button>
          <button class="icon-btn" data-format="underline" type="button"><u>U</u></button>
          <button class="icon-btn" data-format="strikeThrough" type="button"><s>S</s></button>
          <button class="icon-btn" id="addLinkFormat" type="button">🔗</button>
        </div>
      </div>

      <details class="sidebar-section">
        <summary class="sidebar-label clickable">Media ▸</summary>
        <label class="pill pointer" style="margin:0.5rem 0">Add Files<input id="mediaInput" type="file" multiple
            accept="image/*,video/*" hidden /></label>
        <div id="dropzone" class="dropzone">Drop files here</div>
        <div id="mediaPreview" class="media-preview"></div>
      </details>

      <details class="sidebar-section">
        <summary class="sidebar-label clickable">Design ▸</summary>
        <div class="sidebar-fields">
          <label class="field"><span>Card Color</span><input id="cardColor" type="color" value="#ffffff" /></label>
          <label class="field"><span>Text Color</span><input id="textColor" type="color" value="#1a1b1a" /></label>
          <label class="field"><span>Accent</span><input id="accentColor" type="color" value="#0e7a6c" /></label>
          <label class="field"><span>Font</span>
            <select id="fontFamily">
              <option style="font-family:'Source Serif 4',serif" value="'Source Serif 4', serif">Source Serif 4</option>
              <option style="font-family:'Playfair Display',serif" value="'Playfair Display', serif">Playfair Display</option>
              <option style="font-family:'Lora',serif" value="'Lora', serif">Lora</option>
              <option style="font-family:'Merriweather',serif" value="'Merriweather', serif">Merriweather</option>
              <option style="font-family:'IBM Plex Sans',sans-serif" value="'IBM Plex Sans', sans-serif">IBM Plex Sans</option>
              <option style="font-family:'Alegreya Sans',sans-serif" value="'Alegreya Sans', sans-serif">Alegreya Sans</option>
              <option style="font-family:'Space Grotesk',sans-serif" value="'Space Grotesk', sans-serif">Space Grotesk</option>
              <option style="font-family:'Manrope',sans-serif" value="'Manrope', sans-serif">Manrope</option>
              <option style="font-family:'Work Sans',sans-serif" value="'Work Sans', sans-serif">Work Sans</option>
              <option style="font-family:'Fira Sans',sans-serif" value="'Fira Sans', sans-serif">Fira Sans</option>
              <option style="font-family:'Nunito',sans-serif" value="'Nunito', sans-serif">Nunito</option>
              <option style="font-family:'Archivo Narrow',sans-serif" value="'Archivo Narrow', sans-serif">Archivo Narrow</option>
              <option style="font-family:'JetBrains Mono',monospace" value="'JetBrains Mono', monospace">JetBrains Mono</option>
              <option style="font-family:'Bebas Neue',sans-serif" value="'Bebas Neue', sans-serif">Bebas Neue</option>
            </select>
          </label>
          <label class="field"><span>Size</span><input id="baseFontSize" type="range" min="14" max="24"
              value="17" /></label>
          <label class="field"><span>Radius</span><input id="cardRadius" type="range" min="8" max="36"
              value="18" /></label>
        </div>
      </details>

      <details class="sidebar-section">
        <summary class="sidebar-label clickable">Frame ▸</summary>
        <div class="sidebar-fields">
          <label class="toggle"><input id="frameEnabled" type="checkbox" checked /><span>Frame on media</span></label>
          <label class="field"><span>Padding</span><input id="imagePadding" type="number" min="0" max="200"
              value="24" /></label>
          <label class="field"><span>Border</span><input id="imageBorder" type="number" min="0" max="60"
              value="3" /></label>
          <label class="field"><span>Frame BG</span><input id="imageBg" type="color" value="#faf7f2" /></label>
          <label class="field"><span>Border Color</span><input id="imageBorderColor" type="color"
              value="#1d1d1d" /></label>
          <label class="field"><span>Label</span><input id="frameLabelText" type="text"
              placeholder="optional" /></label>
          <label class="field"><span>Quality</span><input id="imageQuality" type="number" min="40" max="100"
              value="86" /></label>
          <label class="field"><span>Prev Start</span><input id="previewStartSec" type="number" min="0" max="90"
              value="0" /></label>
          <label class="field"><span>Duration</span><input id="previewDurationSec" type="number" min="1" max="15"
              value="5" /></label>
          <label class="field"><span>HLS Seg</span><input id="hlsSegmentSec" type="number" min="2" max="12"
              value="4" /></label>
        </div>
      </details>
    </aside>

    <!-- MAIN: Content + Preview -->
    <main class="main-area">
      <!-- Content Blocks -->
      <section class="content-pane">
        <div class="pane-label">Content Blocks</div>
        <div id="blocks" class="blocks"></div>
      </section>

      <!-- Live Preview -->
      <section class="preview-pane">
        <div class="pane-label">Live Preview</div>
        <article id="livePostCard" class="live-post-card"></article>
      </section>
    </main>

    <!-- RIGHT DRAWER: Result + History -->
    <aside class="right-drawer">
      <div class="drawer-section">
        <div class="row between"><span class="pane-label">Result</span><span id="statusPill"
            class="status idle">Idle</span></div>
        <pre id="resultJson" class="json">No submission yet.</pre>
        <div id="resultLinks" class="result-links"></div>
      </div>
      <div class="drawer-section">
        <span class="pane-label">Lens Preview</span>
        <div id="lensPreview" class="lens-preview">Submit a post or click stage history to render preview.</div>
      </div>
      <div class="drawer-section">
        <div class="row between"><span class="pane-label">History</span><button id="refreshHistory"
            class="btn ghost small" type="button">Refresh</button></div>
        <div id="historyList" class="history-list"></div>
      </div>
      <div class="drawer-section">
        <div class="row between"><span class="pane-label">Users</span><button id="refreshUsers"
            class="btn ghost small" type="button">Refresh</button></div>
        <div id="usersList" class="history-list"></div>
      </div>
    </aside>
  </div>

  <template id="blockTemplate">
    <article class="block-card">
      <header class="row between compact"><strong class="block-title"></strong>
        <div class="row actions"><button class="icon-btn up" type="button">↑</button><button class="icon-btn down"
            type="button">↓</button><button class="icon-btn danger remove" type="button">✕</button></div>
      </header>
      <div class="block-body"></div>
    </article>
  </template>
  <script src="/app.js"></script>
</body>

</html>
